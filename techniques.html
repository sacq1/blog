<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术分享 | 岩行记</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
    <meta http-equiv="Cache-Control" content="no-cache">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand"><span>岩</span>行记</a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">首页</a>
                <a href="blog.html">文章</a>
                <a href="techniques.html" class="active">技术分享</a>
                <a href="yanxing.html">岩行中国</a>
                <a href="about.html">关于</a>
            </div>
            <button class="theme-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
            <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('show')">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <section class="page-head">
        <div class="container">
            <h1>攀岩技术分享</h1>
            <p>攀岩技术、绳索技术知识 —— 用 PDF 沉淀知识，自由下载学习</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="tech-categories" id="techCategories">
                <button class="filter-btn active" data-cat="all">全部</button>
                <button class="filter-btn" data-cat="攀岩技术">攀岩技术</button>
                <button class="filter-btn" data-cat="绳索技术">绳索技术</button>
                <button class="filter-btn" data-cat="其他">其他</button>
            </div>

            <div class="tech-grid" id="techGrid"></div>
            <div class="tech-empty" id="techEmpty" style="display:none;">
                <div class="empty-icon">📚</div>
                <p>暂无技术分享内容</p>
                <p style="font-size:0.8rem;">博主正在整理攀岩技术资料，敬请期待</p>
            </div>
        </div>
    </section>

    <!-- PDF 预览模态框 -->
    <div id="pdfModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10001;background:rgba(0,0,0,0.85);" onclick="if(event.target===this)closePdfModal()">
        <div style="position:absolute;top:16px;right:24px;z-index:10;">
            <button onclick="closePdfModal()" style="background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;padding:8px;">✕</button>
        </div>
        <iframe id="pdfFrame" style="width:100%;height:100%;border:none;" allowfullscreen></iframe>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand"><span>岩</span>行记</div>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="blog.html">文章</a>
                <a href="techniques.html">技术分享</a>
                <a href="yanxing.html">岩行中国</a>
                <a href="about.html">关于</a>
            </div>
            <p class="footer-copy">© 2026 岩行记</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
    <script>
        var TECH_PASS = 'LBS20040816';
        var isAuthor = sessionStorage.getItem('techniques_auth') === '1';

        // ==================== 数据管理 ====================
        var TECHNIQUES = [];
        function loadTechniques() {
            try {
                var d = localStorage.getItem('techniques_data');
                if (d) TECHNIQUES = JSON.parse(d);
            } catch(e) { TECHNIQUES = []; }
            if (!TECHNIQUES.length) TECHNIQUES = [];
            // Try fetching from GitHub Pages JSON
            fetch('data/techniques.json?t=' + Date.now())
                .then(function(r) { if (r.ok) return r.json(); throw new Error('no data'); })
                .then(function(data) {
                    if (data && data.length) {
                        TECHNIQUES = data;
                        localStorage.setItem('techniques_data', JSON.stringify(data));
                        renderTechniques();
                    }
                }).catch(function() { /* Use localStorage as fallback */ });
        }

        function saveTechniques() {
            localStorage.setItem('techniques_data', JSON.stringify(TECHNIQUES));
        }

        // ==================== 渲染技术卡片 ====================
        var iconMap = { '攀岩技术': '🧗', '绳索技术': '🪢', '其他': '📖' };
        var currentFilter = 'all';

        function renderTechniques(filter) {
            filter = filter || currentFilter;
            currentFilter = filter;
            var container = document.getElementById('techGrid');
            var empty = document.getElementById('techEmpty');

            var list = filter === 'all' ? TECHNIQUES : TECHNIQUES.filter(function(t) { return t.category === filter; });

            if (!list.length) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            container.innerHTML = list.map(function(t, i) {
                var d = new Date(t.date).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
                var icon = iconMap[t.category] || '📖';
                var hasPdf = !!(t.pdfData || t.pdfUrl || t.pdfFile);
                var dlBtn = '';
                if (t.pdfFile) {
                    dlBtn = '<a href="' + t.pdfFile + '" target="_blank" class="btn-download">📥 下载 PDF</a>';
                } else if (t.pdfData) {
                    dlBtn = '<button class="btn-download" onclick="downloadPdf(' + i + ')">📥 下载 PDF</button>';
                } else if (t.pdfUrl) {
                    dlBtn = '<a href="' + t.pdfUrl + '" target="_blank" class="btn-download">📥 下载 PDF</a>' +
                            '<button class="btn-online" onclick="previewPdfUrl(\'' + t.pdfUrl + '\')">👁 在线预览</button>';
                } else {
                    dlBtn = '<span class="btn-download disabled">暂无文件</span>';
                }

                var delBtn = '';
                if (isAuthor) {
                    delBtn = '<button class="btn btn-ghost btn-sm" onclick="deleteTechnique(' + i + ')" style="color:#e94560;margin-top:8px;">删除</button>';
                }

                return '<article class="tech-card">' +
                    '<div class="tech-card-icon">' + icon + '</div>' +
                    '<div class="tech-card-tag">' + t.category + '</div>' +
                    '<h3 class="tech-card-title">' + t.title + '</h3>' +
                    '<p class="tech-card-desc">' + t.description + '</p>' +
                    '<div class="tech-card-meta">' + d + (t.pdfName ? ' · ' + t.pdfName : '') + '</div>' +
                    '<div class="tech-card-actions">' + dlBtn + '</div>' +
                    delBtn +
                '</article>';
            }).join('');
        }

        // ==================== PDF 下载 ====================
        function downloadPdf(index) {
            var t = TECHNIQUES[index];
            if (!t || !t.pdfData) return;
            var byteChars = atob(t.pdfData.split(',')[1]);
            var byteNums = new Array(byteChars.length);
            for (var i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
            var byteArr = new Uint8Array(byteNums);
            var blob = new Blob([byteArr], { type: 'application/pdf' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = t.pdfName || 'technique.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ==================== PDF 预览 ====================
        function previewPdfUrl(url) {
            document.getElementById('pdfFrame').src = url;
            document.getElementById('pdfModal').style.display = 'block';
        }

        function previewPdfData(index) {
            var t = TECHNIQUES[index];
            if (!t || !t.pdfData) return;
            document.getElementById('pdfFrame').src = t.pdfData;
            document.getElementById('pdfModal').style.display = 'block';
        }

        function closePdfModal() {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('pdfFrame').src = '';
        }

        function deleteTechnique(index) {
            if (!confirm('确定删除「' + TECHNIQUES[index].title + '」？')) return;
            TECHNIQUES.splice(index, 1);
            saveTechniques();
            renderTechniques();
        }

        // ==================== 分类筛选 ====================
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('techCategories').addEventListener('click', function(e) {
                if (!e.target.classList.contains('filter-btn')) return;
                document.querySelectorAll('#techCategories .filter-btn').forEach(function(b) { b.classList.remove('active'); });
                e.target.classList.add('active');
                renderTechniques(e.target.dataset.cat);
            });
        });

        // ==================== 作者登录 ====================
        if (sessionStorage.getItem('techniques_auth') === '1') {
            isAuthor = true;
        }

        // ==================== 初始化 ====================
        loadTechniques();
        renderTechniques();

        // 键盘快捷键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePdfModal();
        });
    </script>
</body>
</html>
